<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>VR Solar System</title>
  <script src="script/aframe.min.js"></script>
</head>

<body>
<a-scene>

  <!-- Assets -->
  <a-assets>
    <img id="milkyway" src="texture/2k_stars_milky_way.jpg">

    <img id="sun-texture" src="texture/2k_sun.jpg">
    <img id="mercury-texture" src="texture/2k_mercury.jpg">
    <img id="venus-texture" src="texture/2k_venus_surface.jpg">
    <img id="earth-texture" src="texture/2k_earth_daymap.jpg">
    <img id="mars-texture" src="texture/2k_mars.jpg">

    <img id="jupiter-texture" src="texture/2k_jupiter.jpg">
    <img id="saturn-texture" src="texture/2k_saturn.jpg">
    <img id="saturn-ring" src="texture/2k_saturn_ring_alpha.png">
    <img id="uranus-texture" src="texture/2k_uranus.jpg">
    <img id="neptune-texture" src="texture/2k_neptune.jpg">
  </a-assets>

  <!-- 🌌 Sky -->
  <a-sky src="#milkyway"
         animation="property: rotation; to: 0 360 0; dur: 900000; loop: true">
  </a-sky>

  <!-- Camera -->
  <a-entity position="0 4 30">
    <a-camera wasd-controls look-controls>
      <a-cursor></a-cursor>
    </a-camera>
  </a-entity>

  <!-- ☀️ Sun Light -->
  <a-entity light="type: ambient; intensity: 0.25"></a-entity>
  <a-entity light="type: point; intensity: 3; distance: 400" position="0 0 0"></a-entity>

  <!-- Solar System -->
  <a-entity>

    <!-- ☀️ Sun -->
    <a-sphere src="#sun-texture"
              radius="3"
              material="shader:flat; emissive: #ff7700; emissiveIntensity: 1.0"
              animation="property: rotation; to: 0 360 0; dur: 50000; loop: true">
    </a-sphere>

    <!-- ORBITS -->
    <a-ring radius-inner="6" radius-outer="6.1" rotation="-90 0 0" color="#00ffff"></a-ring>
    <a-ring radius-inner="9" radius-outer="9.1" rotation="-90 0 0" color="#00ffff"></a-ring>
    <a-ring radius-inner="12" radius-outer="12.1" rotation="-90 0 0" color="#00ffff"></a-ring>
    <a-ring radius-inner="15" radius-outer="15.1" rotation="-90 0 0" color="#00ffff"></a-ring>
    <a-ring radius-inner="20" radius-outer="20.1" rotation="-90 0 0" color="#00ffff"></a-ring>
    <a-ring radius-inner="25" radius-outer="25.1" rotation="-90 0 0" color="#00ffff"></a-ring>
    <a-ring radius-inner="30" radius-outer="30.1" rotation="-90 0 0" color="#00ffff"></a-ring>
    <a-ring radius-inner="35" radius-outer="35.1" rotation="-90 0 0" color="#00ffff"></a-ring>

    <!-- Mercury -->
    <a-entity animation="property: rotation; to: 0 360 0; dur: 10000; loop: true">
      <a-entity position="6 0 0">
        <a-sphere src="#mercury-texture" radius="0.4"
          animation="property: rotation; to: 0 360 0; dur: 7000; loop: true"></a-sphere>
      </a-entity>
    </a-entity>

    <!-- Venus -->
    <a-entity animation="property: rotation; to: 0 360 0; dur: 20000; loop: true">
      <a-entity position="9 0 0">
        <a-sphere src="#venus-texture" radius="0.6"
          animation="property: rotation; to: 0 360 0; dur: 20000; loop: true"></a-sphere>
      </a-entity>
    </a-entity>

    <!-- Earth + Moon -->
    <a-entity animation="property: rotation; to: 0 360 0; dur: 30000; loop: true">
      <a-entity position="12 0 0">

        <a-sphere src="#earth-texture" radius="0.7"
          animation="property: rotation; to: 0 360 0; dur: 8000; loop: true"></a-sphere>

        <!-- Moon -->
        <a-entity animation="property: rotation; to: 0 360 0; dur: 6000; loop: true">
          <a-entity position="2 0 0">
            <a-sphere radius="0.2" color="#ccc"></a-sphere>
          </a-entity>
        </a-entity>

      </a-entity>
    </a-entity>

    <!-- Mars -->
    <a-entity animation="property: rotation; to: 0 360 0; dur: 45000; loop: true">
      <a-entity position="15 0 0">
        <a-sphere src="#mars-texture" radius="0.5"
          animation="property: rotation; to: 0 360 0; dur: 9000; loop: true"></a-sphere>
      </a-entity>
    </a-entity>

    <!-- Jupiter -->
    <a-entity animation="property: rotation; to: 0 360 0; dur: 70000; loop: true">
      <a-entity position="20 0 0">
        <a-sphere src="#jupiter-texture" radius="1.4"
          animation="property: rotation; to: 0 360 0; dur: 5000; loop: true"></a-sphere>
      </a-entity>
    </a-entity>

    <!-- Saturn -->
    <a-entity animation="property: rotation; to: 0 360 0; dur: 90000; loop: true">
      <a-entity position="25 0 0" rotation="0 0 27">

        <a-sphere src="#saturn-texture" radius="1.2"
          animation="property: rotation; to: 0 360 0; dur: 6000; loop: true"></a-sphere>

        <!-- Smaller Rings -->
        <a-ring src="#saturn-ring"
                radius-inner="1.2"
                radius-outer="1.8"
                rotation="90 0 0"
                material="transparent:true; opacity:0.8; side:double">
        </a-ring>

      </a-entity>
    </a-entity>

    <!-- Uranus -->
    <a-entity animation="property: rotation; to: 0 360 0; dur: 120000; loop: true">
      <a-entity position="30 0 0">
        <a-sphere src="#uranus-texture" radius="1"
          animation="property: rotation; to: 0 360 0; dur: 10000; loop: true"></a-sphere>
      </a-entity>
    </a-entity>

    <!-- Neptune -->
    <a-entity animation="property: rotation; to: 0 360 0; dur: 150000; loop: true">
      <a-entity position="35 0 0">
        <a-sphere src="#neptune-texture" radius="1"
          animation="property: rotation; to: 0 360 0; dur: 11000; loop: true"></a-sphere>
      </a-entity>
    </a-entity>

  </a-entity>

</a-scene>
</body>
</html>
